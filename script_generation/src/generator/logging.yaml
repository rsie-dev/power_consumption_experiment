version: 1
disable_existing_loggers: False
formatters:
    console:
        format: "%(asctime)s - %(levelname)s - %(message)s"
    console_output:
        format: "%(message)s"
    console_color:
        #(): "uvicorn.logging.DefaultFormatter"
        fmt: "%(asctime)s.%(msecs)03d %(levelprefix)s %(message)s"
        datefmt: "%H:%M:%S"
        #use_colors: None
    file:
        format: "%(asctime)s %(filename)s(%(lineno)d) %(levelname)-7s %(name)s: %(message)s"

handlers:
    console:
        class: logging.StreamHandler
        formatter: console_output
        stream: ext://sys.stderr
    file:
        class: logging.FileHandler
        mode: w
        level: DEBUG
        formatter: file
        filename: /dev/null

loggers:
    "":
        level: DEBUG
        handlers: [console, file]
